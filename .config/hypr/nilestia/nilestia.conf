# =============================================================================
#  Nilestia-4 — Hyprland Master Override
#  Sources all Nilestia-specific keybinds, rules, and window settings
#  This file is sourced at the bottom of hyprland.conf
# =============================================================================

# Nilestia keybinds (adds new, deactivates conflicting end-4 binds)
source = ~/.config/hypr/nilestia/keybinds.conf

# Nilestia window rules
source = ~/.config/hypr/nilestia/rules.conf

# Nilestia startup exec
source = ~/.config/hypr/nilestia/execs.conf
