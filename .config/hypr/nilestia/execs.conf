# =============================================================================
#  Nilestia-4 — Startup Executables
# =============================================================================

# Start QuickShell with the nilestia profile (overrides end-4's ii profile)
# The nilestia profile includes the end-4 ii components + Nilestia additions
exec-once = killall qs 2>/dev/null; qs -c nilestia &

# Ensure nilestia scripts are in PATH
exec-once = export PATH="$HOME/.local/bin:$PATH"
