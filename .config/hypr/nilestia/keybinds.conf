# =============================================================================
#  Nilestia-4 — Keybinds Override
#  Applied AFTER end-4 keybinds.conf — overrides conflicting binds
# =============================================================================

# ── Unbind end-4's Win+A (was: left sidebar / Gemini panel) ──────────────────
# The sidebar is now opened via the top-left dashboard button only.
# We unbind the old binding so Win+A can be used for Audio Manager.
unbind = Super, A          # was: quickshell:sidebarLeftToggle

# ── Audio Manager ─────────────────────────────────────────────────────────────
# Win + A → Toggle the Nilestia Audio Manager hub
bindd = Super, A, Toggle Audio Manager, exec, nilestia-hub.sh audio

# ── Network Hubs ─────────────────────────────────────────────────────────────
# Win + Alt + W → WiFi Hub
bindd = Super+Alt, W, Toggle WiFi Hub, exec, nilestia-hub.sh wifi

# Win + Alt + B → Bluetooth Hub
bindd = Super+Alt, B, Toggle Bluetooth Hub, exec, nilestia-hub.sh bluetooth

# Win + Alt + C → Wired (Ethernet) Connection Hub
bindd = Super+Alt, C, Toggle Wired Hub, exec, nilestia-hub.sh ethernet

# ── Monitor Hub ───────────────────────────────────────────────────────────────
# Win + Ctrl + M → Monitor Management
bindd = Super+Ctrl, M, Toggle Monitor Hub, exec, nilestia-hub.sh monitor

# ── Lockscreen ────────────────────────────────────────────────────────────────
# Override end-4 lock with Nilestia's Caelestia-based lock
unbind = Super, L                           # remove end-4's loginctl lock-session
bindd = Super, L, Lock screen, exec, ~/.local/bin/nilestia-lock.sh

# ── Dashboard button binds the Gemini panel ──────────────────────────────────
# The dashboard top-left button is handled inside the QuickShell nilestia config.
# No extra hyprland bind needed — it fires via quickshell IPC internally.
