# =============================================================================
#  Nilestia-4 — Window Rules
#  Floating hub windows, lockscreen, and special widget behavior
# =============================================================================

# ── Audio Manager ─────────────────────────────────────────────────────────────
windowrulev2 = float,        class:(nilestia-audio)
windowrulev2 = size 780 540, class:(nilestia-audio)
windowrulev2 = center,       class:(nilestia-audio)
windowrulev2 = animation slide, class:(nilestia-audio)
windowrulev2 = rounding 16,  class:(nilestia-audio)
windowrulev2 = noshadow,     class:(nilestia-audio)

# ── Bluetooth Hub ────────────────────────────────────────────────────────────
windowrulev2 = float,        class:(nilestia-bt)
windowrulev2 = size 720 500, class:(nilestia-bt)
windowrulev2 = center,       class:(nilestia-bt)
windowrulev2 = animation slide, class:(nilestia-bt)
windowrulev2 = rounding 16,  class:(nilestia-bt)

# ── WiFi Hub ──────────────────────────────────────────────────────────────────
windowrulev2 = float,        class:(nilestia-wifi)
windowrulev2 = size 720 500, class:(nilestia-wifi)
windowrulev2 = center,       class:(nilestia-wifi)
windowrulev2 = animation slide, class:(nilestia-wifi)
windowrulev2 = rounding 16,  class:(nilestia-wifi)

# ── Ethernet Hub ──────────────────────────────────────────────────────────────
windowrulev2 = float,        class:(nilestia-ethernet)
windowrulev2 = size 720 480, class:(nilestia-ethernet)
windowrulev2 = center,       class:(nilestia-ethernet)
windowrulev2 = animation slide, class:(nilestia-ethernet)
windowrulev2 = rounding 16,  class:(nilestia-ethernet)

# ── Monitor Hub ───────────────────────────────────────────────────────────────
windowrulev2 = float,        class:(nilestia-monitor)
windowrulev2 = size 860 560, class:(nilestia-monitor)
windowrulev2 = center,       class:(nilestia-monitor)
windowrulev2 = animation slide, class:(nilestia-monitor)
windowrulev2 = rounding 16,  class:(nilestia-monitor)

# ── Top Menu ─────────────────────────────────────────────────────────────────
windowrulev2 = float,        class:(nilestia-topmenu)
windowrulev2 = move 0 0,     class:(nilestia-topmenu)
windowrulev2 = maxsize 100% 48, class:(nilestia-topmenu)
windowrulev2 = noanim,       class:(nilestia-topmenu)
windowrulev2 = noborder,     class:(nilestia-topmenu)
windowrulev2 = noshadow,     class:(nilestia-topmenu)

# ── Opacity: glass-like for all hubs ─────────────────────────────────────────
windowrulev2 = opacity 0.92 override, class:(nilestia-.*)
